<!doctype html>
<html lang="it" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Criminalistica Elena Angelini</title>
    <script type="text/javascript">
      // Safe, defensive handling for sandboxed environments & third-party script blockage
      (function() {
        var suppress = function(msg) {
          if (!msg) return false;
          var m = String(msg).toLowerCase();
          return m.indexOf('script error') !== -1 || 
                 m.indexOf('google') !== -1 || 
                 m.indexOf('translate') !== -1 ||
                 m.indexOf('googtrans') !== -1;
        };

        window.onerror = function(message, source, lineno, colno, error) {
          if (suppress(message) || suppress(source)) {
            console.warn('Caught cross-origin third-party script error via onerror:', message);
            return true; // Prevents the firing of the default event handler
          }
        };

        window.addEventListener('error', function(e) {
          if (e && (suppress(e.message) || suppress(e.filename) || e.message === 'Script error.')) {
            console.warn('Caught cross-origin third-party script error via error listener:', e.message);
            e.preventDefault();
            e.stopPropagation();
            return true;
          }
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
          var reason = e.reason ? String(e.reason.message || e.reason) : '';
          if (suppress(reason)) {
            console.warn('Caught unhandled promise rejection from third-party library:', reason);
            e.preventDefault();
            e.stopPropagation();
            return true;
          }
        });
      })();
    </script>
    <style>
      /* Drastically hide Google Translate's default UI frames and banners */
      .goog-te-banner-frame, 
      .goog-te-banner-frame.skiptranslate,
      iframe[class*="goog-te-banner-frame"],
      #goog-gt-tt {
        display: none !important;
        visibility: hidden !important;
      }
      body {
        top: 0 !important;
      }
      .skiptranslate {
        display: none !important;
      }
    </style>
  </head>
  <body class="bg-cold-950">
    <div id="root"></div>
    
    <!-- Hidden Google Translate Element to enable programmatic translation engine -->
    <div id="google_translate_element" style="display: none; visibility: hidden; width: 0; height: 0;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'it',
          includedLanguages: 'it,en,es,fr,de,pt,ro,nl,pl,tr,sq,ru,zh,ja,ar,hi',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
